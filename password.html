<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access | Sabra Akhtar</title>
    <style>
        :root {
            --primary: #E63946;
            --success: #2ecc71;
            --warning: #f1c40f;
            --dark: #0f172a;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark);
            color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .auth-container {
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid var(--primary);
        }

        .brand-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-header h2 {
            margin: 0;
            letter-spacing: 2px;
            font-weight: 800;
        }

        .brand-header span { color: var(--primary); }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 8px;
            color: #94a3b8;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); }

        /* Strength Bar */
        .strength-meter {
            height: 4px;
            width: 100%;
            background: #334155;
            margin-top: 10px;
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: 0.4s ease;
        }

        .status-text {
            font-size: 0.75rem;
            margin-top: 8px;
            font-weight: 600;
        }

        /* Requirements List */
        .requirements {
            margin-top: 20px;
            list-style: none;
            padding: 0;
            font-size: 0.8rem;
            color: #64748b;
        }

        .requirements li.valid {
            color: var(--success);
        }

        .requirements li.valid::before {
            content: '✓ ';
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="brand-header">
            <h2>SECURE<span>HEAL</span></h2>
            <p style="font-size: 0.8rem; color: #64748b;">Medical Data Protection</p>
        </div>

        <div class="input-group">
            <label>Set Password</label>
            <input type="password" id="pwd" placeholder="Enter robust password..." oninput="checkStrength()">
            
            <div class="strength-meter">
                <div id="bar" class="strength-bar"></div>
            </div>
            <p id="status" class="status-text"></p>
        </div>

        <ul class="requirements">
            <li id="len">At least 8 characters</li>
            <li id="num">Contains a number</li>
            <li id="spec">Contains special character</li>
        </ul>
    </div>

    <script>
        function checkStrength() {
            const pwd = document.getElementById('pwd').value;
            const bar = document.getElementById('bar');
            const status = document.getElementById('status');
            
            let score = 0;

            // Logic tests
            const hasLen = pwd.length >= 8;
            const hasNum = /[0-9]/.test(pwd);
            const hasSpec = /[^A-Za-z0-9]/.test(pwd);

            // Update UI list
            document.getElementById('len').className = hasLen ? 'valid' : '';
            document.getElementById('num').className = hasNum ? 'valid' : '';
            document.getElementById('spec').className = hasSpec ? 'valid' : '';

            if(hasLen) score++;
            if(hasNum) score++;
            if(hasSpec) score++;

            // Update Bar & Text
            if(pwd.length === 0) {
                bar.style.width = '0%';
                status.innerText = '';
            } else if (score === 1) {
                bar.style.width = '33%';
                bar.style.backgroundColor = 'var(--primary)';
                status.innerText = 'WEAK';
                status.style.color = 'var(--primary)';
            } else if (score === 2) {
                bar.style.width = '66%';
                bar.style.backgroundColor = 'var(--warning)';
                status.innerText = 'MEDIUM';
                status.style.color = 'var(--warning)';
            } else if (score === 3) {
                bar.style.width = '100%';
                bar.style.backgroundColor = 'var(--success)';
                status.innerText = 'STRONG';
                status.style.color = 'var(--success)';
            }
        }
    </script>
</body>
</html>
